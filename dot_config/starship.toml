# Minimal starship prompt
# Nerd Font 없이 유니코드 기본 문자만 사용

format = """
$directory\
$git_branch\
$git_status\
$kubernetes\
$aws\
$line_break\
$character"""

right_format = "$cmd_duration"

[directory]
truncate_to_repo = true
truncation_length = 0
truncation_symbol = ""
fish_style_pwd_dir_length = 0
style = "bold #e4e7f3"

[git_branch]
symbol = " "
format = "| [$symbol$branch]($style)"
style = "#8edf96"

[git_status]
format = "[$staged$modified$untracked$deleted$renamed$conflicted$ahead_behind]($style)"
staged = " [+$count](bold #9ece6a)"
modified = " [~$count](#e0af68)"
untracked = " [?$count](#7aa2f7)"
deleted = " [-$count](#f7768e)"
renamed = " [»$count](#bb9af7)"
conflicted = " [!$count](bold #f7768e)"
ahead = " [↑$count](#565f89)"
behind = " [↓$count](#565f89)"
diverged = " [↑$ahead_count↓$behind_count](#565f89)"
style = ""

[kubernetes]
disabled = false
format = " | [󱃾 $context]($style)"
style = "#636985"
detect_folders = []

[kubernetes.context_aliases]

[aws]
disabled = false
force_display = true
format = " | [ $profile]($style)"
style = "#636985"

[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol = "[❯](bold #f7768e)"
vimcmd_symbol = "[❮](bold #9ece6a)"

[sudo]
disabled = false
symbol = "# "
style = "bold #f7768e"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style)"
style = "#565f89"

# 불필요한 모듈 비활성화
[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[docker_context]
disabled = true
